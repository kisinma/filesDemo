apiVersion: apps/v1
kind: Deployment
metadata:
  name: nma-go-app
  labels:
    app: nma-go-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nma-go-app
  template:
    metadata:
      labels:
        app: nma-go-app
    spec:
      containers:
      - name: go-app-container
        # Harness sustituye <+artifact.tag> automáticamente con el tag de la imagen construida
        image: kisinma/repo-harness:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "200m"
            memory: "200Mi"
